<svg width="720" height="420" viewBox="0 0 720 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ca-bg" x1="0" y1="0" x2="720" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <radialGradient id="ca-glow-orange" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(640 60) rotate(120) scale(240 220)">
      <stop offset="0" stop-color="#F97316" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="ca-glow-indigo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(80 380) rotate(-50) scale(260 240)">
      <stop offset="0" stop-color="#6366F1" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#6366F1" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ca-darkcard" x1="0" y1="0" x2="280" y2="320" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="ca-avatar" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F97316"/>
      <stop offset="1" stop-color="#EA580C"/>
    </linearGradient>
    <filter id="ca-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>
  </defs>

  <rect width="720" height="420" rx="28" fill="url(#ca-bg)"/>
  <rect width="720" height="420" rx="28" fill="url(#ca-glow-orange)"/>
  <rect width="720" height="420" rx="28" fill="url(#ca-glow-indigo)"/>

  <!-- Main chat card (left, large) -->
  <g filter="url(#ca-shadow)">
    <rect x="48" y="56" width="380" height="310" rx="20" fill="#FFFFFF" stroke="#E2E8F0"/>
    <!-- Card header -->
    <rect x="48" y="56" width="380" height="56" rx="20" fill="#FFFFFF"/>
    <rect x="48" y="100" width="380" height="12" fill="#FFFFFF"/>
    <circle cx="80" cy="84" r="14" fill="url(#ca-avatar)"/>
    <text x="106" y="80" fill="#0F172A" font-family="Inter, sans-serif" font-size="13" font-weight="600">Customer support</text>
    <text x="106" y="96" fill="#64748B" font-family="Inter, sans-serif" font-size="11">Web chat · Live</text>
    <circle cx="404" cy="84" r="4" fill="#10B981"/>
    <line x1="48" y1="112" x2="428" y2="112" stroke="#E2E8F0"/>

    <!-- Incoming message bubble -->
    <rect x="72" y="132" width="220" height="56" rx="14" fill="#F1F5F9"/>
    <text x="84" y="153" fill="#0F172A" font-family="Inter, sans-serif" font-size="11.5">Where is my order #4421?</text>
    <text x="84" y="170" fill="#64748B" font-family="Inter, sans-serif" font-size="10">Sent · 09:42</text>

    <!-- Tool call chip -->
    <rect x="72" y="202" width="180" height="26" rx="13" fill="#EEF2FF" stroke="#C7D2FE"/>
    <circle cx="86" cy="215" r="4" fill="#6366F1"/>
    <text x="98" y="219" fill="#4338CA" font-family="Inter, sans-serif" font-size="10.5" font-weight="600">tool · lookup_order(4421)</text>

    <!-- Outgoing message bubble (agent reply) -->
    <rect x="120" y="240" width="288" height="92" rx="14" fill="#0F172A"/>
    <text x="134" y="262" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="11.5" font-weight="500">Order #4421 shipped Tuesday and is now</text>
    <text x="134" y="278" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="11.5" font-weight="500">at the local depot. Estimated delivery</text>
    <text x="134" y="294" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="11.5" font-weight="500">tomorrow before 16:00.</text>
    <rect x="134" y="306" width="92" height="20" rx="10" fill="#1E293B"/>
    <text x="146" y="320" fill="#A5B4FC" font-family="Inter, sans-serif" font-size="10" font-weight="600">Track package ’</text>
    <text x="240" y="320" fill="#94A3B8" font-family="Inter, sans-serif" font-size="9.5">Resolved · 09:42</text>

    <!-- Composer -->
    <rect x="72" y="346" width="336" height="8" rx="4" fill="#F1F5F9"/>
  </g>

  <!-- Channels card (top right, dark) -->
  <g filter="url(#ca-shadow)">
    <rect x="464" y="56" width="208" height="148" rx="18" fill="url(#ca-darkcard)"/>
    <text x="484" y="84" fill="#94A3B8" font-family="Inter, sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em">CHANNELS</text>
    <text x="484" y="106" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="14" font-weight="600">One agent, every</text>
    <text x="484" y="124" fill="#FFFFFF" font-family="Inter, sans-serif" font-size="14" font-weight="600">surface</text>

    <!-- Channel chips -->
    <rect x="484" y="142" width="74" height="22" rx="11" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.16)"/>
    <circle cx="496" cy="153" r="3" fill="#34D399"/>
    <text x="506" y="157" fill="#E2E8F0" font-family="Inter, sans-serif" font-size="10" font-weight="500">Web chat</text>

    <rect x="566" y="142" width="60" height="22" rx="11" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.16)"/>
    <circle cx="578" cy="153" r="3" fill="#34D399"/>
    <text x="588" y="157" fill="#E2E8F0" font-family="Inter, sans-serif" font-size="10" font-weight="500">Email</text>

    <rect x="484" y="170" width="56" height="22" rx="11" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.16)"/>
    <circle cx="496" cy="181" r="3" fill="#34D399"/>
    <text x="506" y="185" fill="#E2E8F0" font-family="Inter, sans-serif" font-size="10" font-weight="500">Phone</text>

    <rect x="548" y="170" width="78" height="22" rx="11" fill="rgba(255,255,255,0.08)" stroke="rgba(255,255,255,0.16)"/>
    <circle cx="560" cy="181" r="3" fill="#34D399"/>
    <text x="570" y="185" fill="#E2E8F0" font-family="Inter, sans-serif" font-size="10" font-weight="500">Intranet</text>
  </g>

  <!-- Resolution card (bottom right, light) -->
  <g filter="url(#ca-shadow)">
    <rect x="464" y="220" width="208" height="146" rx="18" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="484" y="246" fill="#64748B" font-family="Inter, sans-serif" font-size="10" font-weight="600" letter-spacing="0.06em">RESOLUTION RATE</text>
    <text x="484" y="282" fill="#0F172A" font-family="Fraunces, serif" font-size="34" font-weight="500">46%</text>
    <text x="484" y="302" fill="#64748B" font-family="Inter, sans-serif" font-size="11">resolved autonomously</text>

    <!-- Mini bar chart -->
    <rect x="484" y="320" width="14" height="28" rx="2" fill="#E2E8F0"/>
    <rect x="504" y="312" width="14" height="36" rx="2" fill="#C7D2FE"/>
    <rect x="524" y="300" width="14" height="48" rx="2" fill="#818CF8"/>
    <rect x="544" y="290" width="14" height="58" rx="2" fill="#6366F1"/>
    <rect x="564" y="280" width="14" height="68" rx="2" fill="#F97316"/>
    <rect x="584" y="276" width="14" height="72" rx="2" fill="#EA580C"/>

    <text x="484" y="362" fill="#94A3B8" font-family="Inter, sans-serif" font-size="9.5">Mar · Apr · May · Jun · Jul · Aug</text>
  </g>
</svg>
