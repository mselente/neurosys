<svg width="720" height="420" viewBox="0 0 720 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ab-bg" x1="0" y1="0" x2="720" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <radialGradient id="ab-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(620 70) rotate(120) scale(220 200)">
      <stop offset="0" stop-color="#F97316" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ab-card-lead" x1="0" y1="0" x2="240" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF7ED"/>
      <stop offset="0.6" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="ab-avatar-1" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1F2937"/>
      <stop offset="1" stop-color="#475569"/>
    </linearGradient>
    <linearGradient id="ab-avatar-2" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#312E81"/>
      <stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <linearGradient id="ab-avatar-3" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0B3B2E"/>
      <stop offset="1" stop-color="#0F766E"/>
    </linearGradient>
    <linearGradient id="ab-avatar-lead" x1="0" y1="0" x2="120" y2="120" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
  </defs>

  <rect width="720" height="420" rx="28" fill="url(#ab-bg)"/>
  <rect width="720" height="420" rx="28" fill="url(#ab-glow)"/>

  <!-- ============ FEATURED LEAD CARD (left, large) ============ -->
  <g>
    <rect x="40" y="48" width="280" height="324" rx="22" fill="url(#ab-card-lead)" stroke="#F97316" stroke-opacity="0.22" stroke-width="1.5"/>

    <!-- Eyebrow tag -->
    <rect x="60" y="68" width="92" height="22" rx="11" fill="#FFEDD5"/>
    <circle cx="74" cy="79" r="3.5" fill="#F97316"/>
    <rect x="86" y="74" width="56" height="9" rx="4.5" fill="#F97316" fill-opacity="0.85"/>

    <!-- Large avatar -->
    <circle cx="180" cy="180" r="60" fill="url(#ab-avatar-lead)"/>
    <!-- subtle stylized face/silhouette inside -->
    <circle cx="180" cy="170" r="22" fill="#FFFFFF" fill-opacity="0.18"/>
    <path d="M150 220 Q180 195 210 220 Z" fill="#FFFFFF" fill-opacity="0.18"/>
    <!-- Orange ring accent -->
    <circle cx="180" cy="180" r="64" fill="none" stroke="#F97316" stroke-opacity="0.55" stroke-width="2"/>

    <!-- Name + role lines -->
    <rect x="80" y="262" width="200" height="14" rx="7" fill="#0F172A" fill-opacity="0.85"/>
    <rect x="100" y="284" width="160" height="9" rx="4.5" fill="#94A3B8"/>

    <!-- LinkedIn pill -->
    <rect x="120" y="312" width="120" height="28" rx="14" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.4"/>
    <rect x="138" y="320" width="14" height="12" rx="2" fill="#0A66C2"/>
    <rect x="160" y="322" width="60" height="8" rx="4" fill="#94A3B8"/>
  </g>

  <!-- ============ TEAM CARDS (right side, grid of 4) ============ -->

  <!-- Card top-left -->
  <g>
    <rect x="340" y="48" width="170" height="148" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.4"/>
    <circle cx="425" cy="100" r="32" fill="url(#ab-avatar-1)"/>
    <circle cx="425" cy="92" r="11" fill="#FFFFFF" fill-opacity="0.22"/>
    <path d="M409 120 Q425 108 441 120 Z" fill="#FFFFFF" fill-opacity="0.22"/>
    <rect x="370" y="148" width="120" height="10" rx="5" fill="#0F172A" fill-opacity="0.78"/>
    <rect x="386" y="166" width="88" height="7" rx="3.5" fill="#CBD5E1"/>
  </g>

  <!-- Card top-right -->
  <g>
    <rect x="530" y="48" width="150" height="148" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.4"/>
    <circle cx="605" cy="100" r="32" fill="url(#ab-avatar-2)"/>
    <circle cx="605" cy="92" r="11" fill="#FFFFFF" fill-opacity="0.22"/>
    <path d="M589 120 Q605 108 621 120 Z" fill="#FFFFFF" fill-opacity="0.22"/>
    <rect x="560" y="148" width="100" height="10" rx="5" fill="#0F172A" fill-opacity="0.78"/>
    <rect x="572" y="166" width="76" height="7" rx="3.5" fill="#CBD5E1"/>
  </g>

  <!-- Card bottom-left -->
  <g>
    <rect x="340" y="216" width="170" height="156" rx="20" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.4"/>
    <circle cx="425" cy="270" r="32" fill="url(#ab-avatar-3)"/>
    <circle cx="425" cy="262" r="11" fill="#FFFFFF" fill-opacity="0.22"/>
    <path d="M409 290 Q425 278 441 290 Z" fill="#FFFFFF" fill-opacity="0.22"/>
    <rect x="370" y="318" width="120" height="10" rx="5" fill="#0F172A" fill-opacity="0.78"/>
    <rect x="386" y="336" width="88" height="7" rx="3.5" fill="#CBD5E1"/>
  </g>

  <!-- Card bottom-right - hub indicator -->
  <g>
    <rect x="530" y="216" width="150" height="156" rx="20" fill="#0F172A"/>

    <!-- Eyebrow tag -->
    <rect x="548" y="234" width="76" height="20" rx="10" fill="#F97316" fill-opacity="0.95"/>
    <rect x="558" y="241" width="56" height="6" rx="3" fill="#FFFFFF"/>

    <!-- 4 hub dots in mini map style -->
    <g transform="translate(548 274)">
      <circle cx="14" cy="20" r="5" fill="#F97316"/>
      <circle cx="14" cy="20" r="9" fill="none" stroke="#F97316" stroke-opacity="0.4"/>

      <circle cx="60" cy="44" r="4" fill="#FFFFFF" fill-opacity="0.55"/>
      <circle cx="78" cy="34" r="4" fill="#FFFFFF" fill-opacity="0.55"/>
      <circle cx="96" cy="58" r="4" fill="#FFFFFF" fill-opacity="0.55"/>

      <!-- Connecting lines -->
      <path d="M14 20 L60 44" stroke="#F97316" stroke-opacity="0.5" stroke-width="1.2" stroke-dasharray="2 3"/>
      <path d="M60 44 L78 34" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="1.2" stroke-dasharray="2 3"/>
      <path d="M78 34 L96 58" stroke="#FFFFFF" stroke-opacity="0.3" stroke-width="1.2" stroke-dasharray="2 3"/>
    </g>

    <rect x="548" y="346" width="76" height="8" rx="4" fill="#FFFFFF" fill-opacity="0.85"/>
  </g>
</svg>
