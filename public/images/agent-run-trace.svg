    <text x="228" y="391" fill="#047857" font-family="Inter,sans-serif" font-size="10" font-weight="600">action: log_resolved</text>
    <text x="660" y="370" text-anchor="end" fill="#94A3B8" font-family="Inter,sans-serif" font-size="11" font-weight="500">190ms</text>
