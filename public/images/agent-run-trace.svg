    <line x1="32" y1="528" x2="688" y2="528" stroke="#E2E8F0"/>
    <text x="48" y="548" fill="#475569" font-family="Inter,sans-serif" font-size="11.5" font-weight="500">Resolved without human handover</text>
    <text x="672" y="548" text-anchor="end" fill="#94A3B8" font-family="Inter,sans-serif" font-size="11">Total 0.75s · 1 tool call · 421 tokens</text>
