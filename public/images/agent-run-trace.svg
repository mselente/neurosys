    <circle cx="60" cy="466" r="14" fill="#F1F5F9"/>
    <text x="60" y="470" text-anchor="middle" fill="#475569" font-family="Inter,sans-serif" font-size="11" font-weight="700">04</text>
    <text x="88" y="454" fill="#0F172A" font-family="Inter,sans-serif" font-size="13" font-weight="600">Escalate with context (when needed)</text>
