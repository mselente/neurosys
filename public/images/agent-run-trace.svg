    <rect x="556" y="50" width="108" height="30" rx="15" fill="#ECFDF5" stroke="#A7F3D0"/>
    <circle cx="572" cy="65" r="3.5" fill="#10B981"/>
    <text x="582" y="69" fill="#047857" font-family="Inter,sans-serif" font-size="11.5" font-weight="600">Resolved · 0.75s</text>
  </g>

