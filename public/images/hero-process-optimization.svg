<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" role="img" aria-label="AI process optimization outcomes: throughput climbs and manual work drops once agentic workflows are live">
  <defs>
    <filter id="po-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="rgba(15,23,42,0.10)"/>
    </filter>
    <filter id="po-shadow-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="rgba(15,23,42,0.08)"/>
    </filter>
    <radialGradient id="po-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(360 210) scale(320)">
      <stop offset="0" stop-color="#F97316" stop-opacity="0.10"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="po-area" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F97316" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="po-area-base" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#94A3B8" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#94A3B8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="po-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#FFF7ED"/>
    </linearGradient>
  </defs>

  <rect width="720" height="420" fill="#FFFFFF"/>
  <rect width="720" height="420" fill="url(#po-glow)"/>

  <!-- LEFT: PERFORMANCE CHART CARD -->
  <g filter="url(#po-shadow)">
    <rect x="40" y="40" width="430" height="300" rx="20" fill="url(#po-card)" stroke="rgba(249,115,22,0.32)"/>

    <!-- Card header -->
    <text x="60" y="72" font-family="Inter,sans-serif" font-size="9.5" font-weight="700" letter-spacing="0.16em" fill="#9A3412">OPERATIONAL OUTCOMES</text>
    <text x="60" y="96" font-family="Inter,sans-serif" font-size="15" font-weight="600" fill="#0F172A">Throughput per week</text>

    <!-- Live tag -->
    <g>
      <rect x="394" y="58" width="60" height="20" rx="10" fill="#ECFDF5" stroke="#A7F3D0"/>
      <circle cx="406" cy="68" r="3" fill="#10B981"/>
      <text x="414" y="71.5" font-family="Inter,sans-serif" font-size="9.5" font-weight="600" fill="#047857">Live</text>
    </g>

    <!-- Chart frame -->
    <g>
      <!-- Y axis grid -->
      <g stroke="#E2E8F0" stroke-width="1">
        <line x1="80" y1="130" x2="450" y2="130"/>
        <line x1="80" y1="170" x2="450" y2="170"/>
        <line x1="80" y1="210" x2="450" y2="210"/>
        <line x1="80" y1="250" x2="450" y2="250"/>
        <line x1="80" y1="290" x2="450" y2="290"/>
      </g>

      <!-- Y labels -->
      <g font-family="Inter,sans-serif" font-size="9" fill="#94A3B8" text-anchor="end">
        <text x="74" y="133">300</text>
        <text x="74" y="173">225</text>
        <text x="74" y="213">150</text>
        <text x="74" y="253">75</text>
        <text x="74" y="293">0</text>
      </g>

      <!-- Baseline (manual) area + line -->
      <path d="M80 268 L120 264 L160 270 L200 262 L240 266 L280 260 L320 258 L360 264 L400 260 L440 256 L450 254 L450 290 L80 290 Z" fill="url(#po-area-base)"/>
      <path d="M80 268 L120 264 L160 270 L200 262 L240 266 L280 260 L320 258 L360 264 L400 260 L440 256 L450 254" fill="none" stroke="#94A3B8" stroke-width="1.6" stroke-dasharray="3 4"/>

      <!-- Agents-on area + line -->
      <path d="M80 268 L120 262 L160 256 L200 248 L240 232 L280 208 L320 180 L360 158 L400 142 L440 132 L450 130 L450 290 L80 290 Z" fill="url(#po-area)"/>
      <path d="M80 268 L120 262 L160 256 L200 248 L240 232 L280 208 L320 180 L360 158 L400 142 L440 132 L450 130" fill="none" stroke="#F97316" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>

      <!-- "Agents live" marker -->
      <line x1="240" y1="120" x2="240" y2="290" stroke="#9A3412" stroke-width="1" stroke-dasharray="2 4" opacity="0.55"/>
      <g>
        <rect x="200" y="106" width="92" height="20" rx="10" fill="#FFF7ED" stroke="#FED7AA"/>
        <circle cx="212" cy="116" r="3" fill="#F97316"/>
        <text x="220" y="119.5" font-family="Inter,sans-serif" font-size="9.5" font-weight="600" fill="#9A3412">Agents live</text>
      </g>

      <!-- End point dot + label -->
      <circle cx="450" cy="130" r="5" fill="#FFFFFF" stroke="#F97316" stroke-width="2.4"/>
      <g>
        <rect x="370" y="74" width="86" height="22" rx="11" fill="#FFFFFF" stroke="#FED7AA"/>
        <text x="413" y="89" text-anchor="middle" font-family="Inter,sans-serif" font-size="10.5" font-weight="700" fill="#9A3412">+3.1x cases</text>
      </g>

      <!-- X axis labels -->
      <g font-family="Inter,sans-serif" font-size="9" fill="#94A3B8" text-anchor="middle">
        <text x="80" y="308">W1</text>
        <text x="160" y="308">W3</text>
        <text x="240" y="308">W5</text>
        <text x="320" y="308">W7</text>
        <text x="400" y="308">W9</text>
        <text x="450" y="308">W11</text>
      </g>
    </g>
  </g>

  <!-- RIGHT: OUTCOME TILES -->
  <g font-family="Inter,sans-serif">
    <text x="500" y="58" font-size="9.5" font-weight="700" letter-spacing="0.16em" fill="#94A3B8">RESULTS</text>

    <!-- Tile 1: manual work down -->
    <g filter="url(#po-shadow-soft)">
      <rect x="500" y="74" width="180" height="80" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
      <rect x="500" y="74" width="3" height="80" rx="1.5" fill="#F97316"/>
      <text x="518" y="100" font-size="10" font-weight="600" letter-spacing="0.04em" fill="#64748B">Manual work</text>
      <text x="518" y="128" font-size="26" font-weight="700" fill="#0F172A">−80%</text>
      <text x="518" y="146" font-size="9.5" fill="#94A3B8">vs. baseline</text>
      <!-- mini sparkline going down -->
      <path d="M620 138 L632 134 L644 130 L656 124 L668 116" fill="none" stroke="#F97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    </g>

    <!-- Tile 2: hours back -->
    <g filter="url(#po-shadow-soft)">
      <rect x="500" y="166" width="180" height="80" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
      <rect x="500" y="166" width="3" height="80" rx="1.5" fill="#10B981"/>
      <text x="518" y="192" font-size="10" font-weight="600" letter-spacing="0.04em" fill="#64748B">Hours back / week</text>
      <text x="518" y="220" font-size="26" font-weight="700" fill="#0F172A">+220h</text>
      <text x="518" y="238" font-size="9.5" fill="#94A3B8">across teams</text>
      <!-- mini sparkline up -->
      <path d="M620 232 L632 226 L644 222 L656 214 L668 206" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.85"/>
    </g>

    <!-- Tile 3: time to live -->
    <g filter="url(#po-shadow-soft)">
      <rect x="500" y="258" width="180" height="80" rx="16" fill="#FFFFFF" stroke="#E2E8F0"/>
      <rect x="500" y="258" width="3" height="80" rx="1.5" fill="#6366F1"/>
      <text x="518" y="284" font-size="10" font-weight="600" letter-spacing="0.04em" fill="#64748B">Time to first agent</text>
      <text x="518" y="312" font-size="26" font-weight="700" fill="#0F172A">2-4 wks</text>
      <text x="518" y="330" font-size="9.5" fill="#94A3B8">in production</text>
      <!-- mini bars -->
      <g>
        <rect x="620" y="316" width="6" height="14" rx="2" fill="#C7D2FE"/>
        <rect x="630" y="310" width="6" height="20" rx="2" fill="#C7D2FE"/>
        <rect x="640" y="304" width="6" height="26" rx="2" fill="#A5B4FC"/>
        <rect x="650" y="298" width="6" height="32" rx="2" fill="#818CF8"/>
        <rect x="660" y="292" width="6" height="38" rx="2" fill="#6366F1"/>
      </g>
    </g>
  </g>

  <!-- BOTTOM STATUS BAR -->
  <g filter="url(#po-shadow-soft)">
    <rect x="40" y="362" width="640" height="34" rx="12" fill="#FFFFFF" stroke="#E2E8F0"/>
    <circle cx="60" cy="379" r="4" fill="#10B981"/>
    <text x="72" y="383" font-family="Inter,sans-serif" font-size="10.5" font-weight="600" fill="#0F172A">12 workflows in production</text>
    <text x="226" y="383" font-family="Inter,sans-serif" font-size="10" fill="#64748B">· 86% auto-resolved · avg run 0.6s · &lt; 0.1% rework</text>
    <rect x="568" y="370" width="96" height="18" rx="9" fill="#FEF3E2" stroke="#FED7AA"/>
    <text x="616" y="383" text-anchor="middle" font-family="Inter,sans-serif" font-size="9.5" font-weight="600" fill="#9A3412">SLA holding +12pp</text>
  </g>
</svg>
