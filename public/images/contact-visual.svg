<svg width="720" height="420" viewBox="0 0 720 420" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="ct-bg" x1="0" y1="0" x2="720" y2="420" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F8FAFC"/>
    </linearGradient>
    <radialGradient id="ct-glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(640 80) rotate(125) scale(240 220)">
      <stop offset="0" stop-color="#F97316" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#F97316" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ct-avatar" x1="0" y1="0" x2="80" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0F172A"/>
      <stop offset="1" stop-color="#334155"/>
    </linearGradient>
    <linearGradient id="ct-card-warm" x1="0" y1="0" x2="280" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFF7ED"/>
      <stop offset="0.7" stop-color="#FFFFFF"/>
    </linearGradient>
  </defs>

  <rect width="720" height="420" rx="28" fill="url(#ct-bg)"/>
  <rect width="720" height="420" rx="28" fill="url(#ct-glow)"/>

  <!-- ============ FEATURED CALENDAR / BOOKING CARD (left) ============ -->
  <g>
    <rect x="40" y="56" width="320" height="308" rx="22" fill="url(#ct-card-warm)" stroke="#F97316" stroke-opacity="0.22" stroke-width="1.5"/>

    <!-- Header row: tag + month -->
    <g>
      <rect x="60" y="76" width="110" height="22" rx="11" fill="#FFEDD5"/>
      <circle cx="74" cy="87" r="3.5" fill="#F97316"/>
      <rect x="86" y="82" width="74" height="9" rx="4.5" fill="#F97316" fill-opacity="0.85"/>
      <rect x="240" y="82" width="80" height="10" rx="5" fill="#0F172A" fill-opacity="0.78"/>
    </g>

    <!-- Day-of-week strip -->
    <g transform="translate(60 116)" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#94A3B8" text-anchor="middle">
      <text x="20" y="10">Mon</text>
      <text x="60" y="10">Tue</text>
      <text x="100" y="10">Wed</text>
      <text x="140" y="10">Thu</text>
      <text x="180" y="10">Fri</text>
      <text x="220" y="10">Sat</text>
      <text x="260" y="10">Sun</text>
    </g>

    <!-- Date grid (4 rows x 7 cols) -->
    <g transform="translate(60 134)">
      <!-- row 1 -->
      <g fill="#E2E8F0">
        <rect x="0" y="0" width="36" height="28" rx="8"/>
        <rect x="40" y="0" width="36" height="28" rx="8"/>
        <rect x="80" y="0" width="36" height="28" rx="8"/>
        <rect x="120" y="0" width="36" height="28" rx="8"/>
        <rect x="160" y="0" width="36" height="28" rx="8"/>
        <rect x="200" y="0" width="36" height="28" rx="8"/>
        <rect x="240" y="0" width="36" height="28" rx="8"/>
      </g>
      <!-- row 2 -->
      <g fill="#E2E8F0">
        <rect x="0" y="34" width="36" height="28" rx="8"/>
        <rect x="40" y="34" width="36" height="28" rx="8"/>
        <rect x="80" y="34" width="36" height="28" rx="8"/>
        <rect x="120" y="34" width="36" height="28" rx="8"/>
        <rect x="160" y="34" width="36" height="28" rx="8"/>
        <rect x="200" y="34" width="36" height="28" rx="8"/>
        <rect x="240" y="34" width="36" height="28" rx="8"/>
      </g>
      <!-- row 3 with selected date -->
      <g fill="#E2E8F0">
        <rect x="0" y="68" width="36" height="28" rx="8"/>
        <rect x="40" y="68" width="36" height="28" rx="8"/>
        <rect x="80" y="68" width="36" height="28" rx="8"/>
        <rect x="160" y="68" width="36" height="28" rx="8"/>
        <rect x="200" y="68" width="36" height="28" rx="8"/>
        <rect x="240" y="68" width="36" height="28" rx="8"/>
      </g>
      <!-- selected pill -->
      <rect x="120" y="68" width="36" height="28" rx="8" fill="#F97316"/>
      <text x="138" y="86" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#FFFFFF" text-anchor="middle">17</text>

      <!-- row 4 -->
      <g fill="#E2E8F0">
        <rect x="0" y="102" width="36" height="28" rx="8"/>
        <rect x="40" y="102" width="36" height="28" rx="8"/>
        <rect x="80" y="102" width="36" height="28" rx="8"/>
        <rect x="120" y="102" width="36" height="28" rx="8"/>
        <rect x="160" y="102" width="36" height="28" rx="8"/>
        <rect x="200" y="102" width="36" height="28" rx="8"/>
        <rect x="240" y="102" width="36" height="28" rx="8"/>
      </g>
    </g>

    <!-- Available time slots -->
    <g transform="translate(60 286)">
      <rect x="0" y="0" width="80" height="30" rx="15" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.4"/>
      <text x="40" y="19" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#475569" text-anchor="middle">09:00</text>

      <rect x="92" y="0" width="80" height="30" rx="15" fill="#0F172A"/>
      <text x="132" y="19" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#FFFFFF" text-anchor="middle">11:30</text>

      <rect x="184" y="0" width="80" height="30" rx="15" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.4"/>
      <text x="224" y="19" font-family="Inter, sans-serif" font-size="10" font-weight="500" fill="#475569" text-anchor="middle">14:00</text>
    </g>

    <!-- Bottom helper line -->
    <rect x="60" y="334" width="220" height="8" rx="4" fill="#CBD5E1"/>
  </g>

  <!-- ============ MESSAGE / CHAT CARD (top right) ============ -->
  <g>
    <rect x="380" y="56" width="300" height="156" rx="22" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="1.4"/>

    <!-- Avatar + name -->
    <circle cx="412" cy="92" r="20" fill="url(#ct-avatar)"/>
    <circle cx="412" cy="86" r="7" fill="#FFFFFF" fill-opacity="0.22"/>
    <path d="M402 105 Q412 98 422 105 Z" fill="#FFFFFF" fill-opacity="0.22"/>
    <!-- Online dot -->
    <circle cx="426" cy="106" r="5" fill="#22C55E" stroke="#FFFFFF" stroke-width="2"/>

    <rect x="442" y="80" width="120" height="10" rx="5" fill="#0F172A" fill-opacity="0.78"/>
    <rect x="442" y="96" width="80" height="8" rx="4" fill="#94A3B8"/>

    <!-- Incoming message bubble -->
    <g>
      <rect x="402" y="128" width="180" height="36" rx="14" fill="#F1F5F9"/>
      <rect x="416" y="138" width="120" height="6" rx="3" fill="#94A3B8"/>
      <rect x="416" y="150" width="90" height="6" rx="3" fill="#94A3B8"/>
    </g>

    <!-- Outgoing reply bubble -->
    <g>
      <rect x="478" y="172" width="180" height="28" rx="14" fill="#F97316"/>
      <rect x="492" y="182" width="120" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.95"/>
    </g>
  </g>

  <!-- ============ CONTACT METHODS CARD (bottom right) ============ -->
  <g>
    <rect x="380" y="232" width="300" height="132" rx="22" fill="#0F172A"/>

    <!-- Eyebrow -->
    <rect x="400" y="252" width="84" height="20" rx="10" fill="#F97316" fill-opacity="0.95"/>
    <rect x="410" y="259" width="64" height="6" rx="3" fill="#FFFFFF"/>

    <!-- Three contact icons in a row -->
    <g transform="translate(400 290)">
      <!-- Email -->
      <g transform="translate(0 0)">
        <rect x="0" y="0" width="80" height="56" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
        <g transform="translate(28 14)" stroke="#F97316" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <rect x="0" y="2" width="24" height="18" rx="3"/>
          <path d="M0 5L12 14L24 5"/>
        </g>
        <rect x="22" y="42" width="36" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.5"/>
      </g>
      <!-- Phone -->
      <g transform="translate(94 0)">
        <rect x="0" y="0" width="80" height="56" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
        <g transform="translate(28 14)" stroke="#F97316" stroke-width="1.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
          <path d="M2 4 C 2 2 4 1 6 2 L 9 5 C 10 7 8 9 7 10 C 9 14 13 18 17 20 C 18 19 20 17 22 18 L 25 21 C 26 23 25 25 23 25 C 13 25 2 14 2 4 Z"/>
        </g>
        <rect x="22" y="42" width="36" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.5"/>
      </g>
      <!-- LinkedIn -->
      <g transform="translate(188 0)">
        <rect x="0" y="0" width="80" height="56" rx="14" fill="rgba(255,255,255,0.06)" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
        <g transform="translate(28 14) scale(0.05)" fill="#F97316">
          <path d="M409.4 0H30.6C13.7 0 0 13.4 0 29.9v380.2C0 426.6 13.7 440 30.6 440h378.7c16.9 0 30.6-13.4 30.6-29.9V29.9C440 13.4 426.3 0 409.4 0zM135.6 375.7H69.6V165.3h66.1v210.4zM102.6 136.5c-21.2 0-38.3-17.2-38.3-38.3 0-21.2 17.2-38.3 38.3-38.3 21.2 0 38.3 17.2 38.3 38.3 0 21.2-17.1 38.3-38.3 38.3zm272.9 239.2H309.5V273.4c0-24.5-.4-56-34.1-56-34.1 0-39.4 26.7-39.4 54.2v104.1H170V165.3h63.5v28.8h.9c8.8-16.8 30.4-34.5 62.6-34.5 67 0 79.4 44.1 79.4 101.5v114.6z"/>
        </g>
        <rect x="22" y="42" width="36" height="6" rx="3" fill="#FFFFFF" fill-opacity="0.5"/>
      </g>
    </g>
  </g>
</svg>
