<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Preparing Your Analysis - NeuroSYS</title>
    <meta
      name="description"
      content="NeuroSYS is preparing your AI opportunity analysis."
    />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="stylesheet" href="/styles.css?v=__CSS_VERSION__" />
    <link rel="canonical" href="https://www.neurosys.no/analyze-your-business/loading" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.neurosys.no/analyze-your-business/loading" />
    <meta property="og:title" content="Preparing Your Analysis - NeuroSYS" />
    <meta
      property="og:description"
      content="NeuroSYS is preparing your AI opportunity analysis."
    />
  </head>
  <body>
    <!--#include virtual="/_partials/site-header.html" -->

    <main id="main">
      <section class="section-shell analyzer-loading-shell">
        <div class="container analyzer-loading-wrap" data-analyzer-loading>
          <div class="analyzer-loading-card">
            <p class="eyebrow">Analyze your business</p>
            <h1>We are analyzing your business</h1>
            <p class="section-subtitle" data-analyzer-loading-note>
              We are looking through the website now.
            </p>
            <div class="analyzer-loading-target" data-analyzer-loading-target hidden></div>
            <div class="analyzer-loading-steps" aria-hidden="true">
              <span></span>
              <span></span>
              <span></span>
            </div>
            <p class="analyzer-loading-status" data-analyzer-loading-status>
              This usually takes a few seconds.
            </p>
            <div class="analyzer-loading-actions" data-analyzer-loading-actions hidden>
              <button class="button primary" type="button" data-analyzer-retry>
                Retry analysis →
              </button>
              <a class="button tertiary" href="/analyze-your-business">
                Try another company
              </a>
            </div>
          </div>
        </div>
      </section>
    </main>

    <!--#include virtual="/_partials/site-footer.html" -->
    <script src="/app.js?v=__JS_VERSION__" defer></script>
  </body>
</html>
